spring:
  application:
    name: teammember
  profiles:
    active: local

---
# [Local ??]
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

---
# [Prod ??]
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    # ??? ?? RDS ??? ??? ?? ????
    url: jdbc:mysql://your-rds-endpoint:3306/your-db-name
    username: admin
    password: password123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update

---
# [?? ??]
logging:
  level:
    root: INFO
    com.sparta.teammember: INFO

management:
  endpoints:
    web:
      exposure:
        include: health, info